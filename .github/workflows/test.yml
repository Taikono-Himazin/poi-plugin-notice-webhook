name: Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  aws-lambda-tests:
    name: AWS Lambda Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: aws
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: aws/package-lock.json
      - run: npm ci
      - run: npx jest --verbose --coverage
      - uses: MishaKav/jest-coverage-comment@main
        if: github.event_name == 'pull_request'
        with:
          title: AWS Lambda Coverage
          coverage-summary-path: aws/coverage/coverage-summary.json
          junitxml-path: ''
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: aws-coverage
          path: aws/coverage/

  plugin-tests:
    name: Plugin Pure Function Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npx jest --verbose --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: plugin-coverage
          path: src/coverage/

  mobile-app-tests:
    name: Mobile App Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: mobile-app/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx jest --verbose --coverage
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-coverage
          path: mobile-app/coverage/

  coverage-badge:
    name: Update Coverage Badge
    needs: aws-lambda-tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: aws-coverage
          path: coverage
      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(node -e "const c=require('./coverage/coverage-summary.json');console.log(c.total.statements.pct)")
          echo "pct=$COVERAGE" >> "$GITHUB_OUTPUT"
      - name: Create Gist Badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_TOKEN }}
          gistID: ${{ vars.COVERAGE_GIST_ID }}
          filename: coverage.json
          label: coverage
          message: ${{ steps.coverage.outputs.pct }}%
          valColorRange: ${{ steps.coverage.outputs.pct }}
          minColorRange: 50
          maxColorRange: 100
