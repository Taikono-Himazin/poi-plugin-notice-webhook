<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="780" height="520" viewBox="-0.5 -0.5 780 520">
  <defs/>
  <g>
    <rect x="0" y="0" width="780" height="520" fill="#0f0f1a" rx="12"/>

    <!-- Title -->
    <text x="390" y="30" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="#fff">クラウド配信 + モバイルアプリ フロー</text>

    <!-- Lifeline labels -->
    <rect x="20" y="50" width="100" height="36" rx="6" fill="#1e1e30" stroke="#5865f2" stroke-width="1.5"/>
    <text x="70" y="73" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">ゲーム</text>

    <rect x="170" y="50" width="100" height="36" rx="6" fill="#1e1e30" stroke="#5865f2" stroke-width="1.5"/>
    <text x="220" y="73" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">poi プラグイン</text>

    <rect x="340" y="50" width="100" height="36" rx="6" fill="#1e1e30" stroke="#ff9900" stroke-width="1.5"/>
    <text x="390" y="73" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">AWS Lambda</text>

    <rect x="500" y="50" width="100" height="36" rx="6" fill="#1e1e30" stroke="#4630eb" stroke-width="1.5"/>
    <text x="550" y="73" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">Expo Push</text>

    <rect x="660" y="50" width="100" height="36" rx="6" fill="#1e1e30" stroke="#57f287" stroke-width="1.5"/>
    <text x="710" y="73" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#fff">モバイルアプリ</text>

    <!-- Lifelines -->
    <line x1="70" y1="86" x2="70" y2="500" stroke="#333" stroke-width="1"/>
    <line x1="220" y1="86" x2="220" y2="500" stroke="#333" stroke-width="1"/>
    <line x1="390" y1="86" x2="390" y2="500" stroke="#333" stroke-width="1"/>
    <line x1="550" y1="86" x2="550" y2="500" stroke="#333" stroke-width="1"/>
    <line x1="710" y1="86" x2="710" y2="500" stroke="#333" stroke-width="1"/>

    <!-- Step 1: Game → poi -->
    <line x1="70" y1="120" x2="218" y2="120" stroke="#5865f2" stroke-width="1.5"/>
    <polygon points="214,115 222,120 214,125" fill="#5865f2"/>
    <text x="145" y="113" text-anchor="middle" font-family="Arial" font-size="10" fill="#aaa">API レスポンス</text>

    <!-- Step 2: poi → AWS -->
    <line x1="220" y1="160" x2="388" y2="160" stroke="#5865f2" stroke-width="1.5"/>
    <polygon points="384,155 392,160 384,165" fill="#5865f2"/>
    <text x="305" y="153" text-anchor="middle" font-family="Arial" font-size="10" fill="#5865f2">PUT /timers</text>

    <!-- Step 3: AWS internal -->
    <rect x="360" y="190" width="180" height="30" rx="5" fill="#1e1e30" stroke="#ff9900" stroke-width="1"/>
    <text x="450" y="210" text-anchor="middle" font-family="Arial" font-size="10" fill="#ff9900">DynamoDB 保存 + スケジュール作成</text>

    <!-- Step 4: AWS → Expo Push -->
    <line x1="390" y1="240" x2="548" y2="240" stroke="#4630eb" stroke-width="1.5"/>
    <polygon points="544,235 552,240 544,245" fill="#4630eb"/>
    <text x="470" y="233" text-anchor="middle" font-family="Arial" font-size="10" fill="#4630eb">サイレントプッシュ送信</text>

    <!-- Step 5: Expo → Mobile -->
    <line x1="550" y1="270" x2="708" y2="270" stroke="#4630eb" stroke-width="1.5"/>
    <polygon points="704,265 712,270 704,275" fill="#4630eb"/>
    <text x="630" y="263" text-anchor="middle" font-family="Arial" font-size="10" fill="#4630eb">APNs / FCM</text>

    <!-- Step 6: Mobile → AWS (GET /timers) -->
    <line x1="710" y1="310" x2="392" y2="310" stroke="#57f287" stroke-width="1.5"/>
    <polygon points="396,305 388,310 396,315" fill="#57f287"/>
    <text x="550" y="303" text-anchor="middle" font-family="Arial" font-size="10" fill="#57f287">GET /timers</text>

    <!-- Step 7: AWS → Mobile (response) -->
    <line x1="390" y1="340" x2="708" y2="340" stroke="#57f287" stroke-width="1.5" stroke-dasharray="4 3"/>
    <polygon points="704,335 712,340 704,345" fill="#57f287"/>
    <text x="550" y="333" text-anchor="middle" font-family="Arial" font-size="10" fill="#888">タイマー一覧</text>

    <!-- Step 8: Mobile self - schedule -->
    <rect x="660" y="360" width="110" height="30" rx="5" fill="#1e1e30" stroke="#57f287" stroke-width="1"/>
    <text x="715" y="380" text-anchor="middle" font-family="Arial" font-size="10" fill="#57f287">ローカル通知スケジュール</text>

    <!-- Step 9: Notification fires -->
    <rect x="640" y="410" width="130" height="36" rx="5" fill="#57f287"/>
    <text x="705" y="425" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0f0f1a">完了時刻に</text>
    <text x="705" y="440" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0f0f1a">プッシュ通知</text>

    <!-- Step 10: EventBridge fires → Discord -->
    <rect x="320" y="410" width="140" height="36" rx="5" fill="#ff9900"/>
    <text x="390" y="425" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0f0f1a">EventBridge 発火</text>
    <text x="390" y="440" text-anchor="middle" font-family="Arial" font-size="10" font-weight="bold" fill="#0f0f1a">→ Discord / Slack</text>

    <!-- Timeline note -->
    <line x1="20" y1="460" x2="760" y2="460" stroke="#333" stroke-width="1" stroke-dasharray="3 3"/>
    <text x="390" y="485" text-anchor="middle" font-family="Arial" font-size="11" fill="#555">完了時刻</text>
    <line x1="390" y1="490" x2="390" y2="460" stroke="#555" stroke-width="1"/>
    <polygon points="385,464 390,458 395,464" fill="#555"/>
  </g>
</svg>
